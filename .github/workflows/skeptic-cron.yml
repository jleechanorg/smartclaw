name: Skeptic Cron

# Runs every 30 minutes — evaluates all open PRs and merges when 7-green.
# 7-green: CI + no conflicts + CR approved + bugbot clean + comments resolved + evidence + skeptic verdict

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: skeptic-cron
  cancel-in-progress: false

jobs:
  skeptic_cron:
    name: Skeptic Cron
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: read
    outputs:
      merged_count: ${{ steps.merge_prs.outputs.merged_count }}
    steps:
      - name: List open PRs
        id: list_prs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # gh --paginate emits separate JSON docs per page; use jq -s to slurp and merge
          # all pages before filtering so no PRs from intermediate pages are lost.
          PR_JSON=$(gh api repos/${{ github.repository }}/pulls --paginate \
            | jq -s 'add | [.[] | select(.draft == false) | {number, title, head: {ref: .head.ref, sha: .head.sha}, base: {ref: .base.ref}, mergeable}]')

          echo "Open non-draft PRs: $(echo "$PR_JSON" | jq 'length')"
          echo "pr_numbers=$(echo "$PR_JSON" | jq -c '.')" >> "$GITHUB_OUTPUT"
          echo "pr_count=$(echo "$PR_JSON" | jq 'length')" >> "$GITHUB_OUTPUT"

      - name: Check 7-green and merge
        id: merge_prs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.list_prs.outputs.pr_numbers }}
        run: |
          MERGED=0

          for PR in $(echo "$PR_JSON" | jq -r '.[] | @base64'); do
            PR_DATA=$(echo "$PR" | base64 -d)
            PR_NUM=$(echo "$PR_DATA" | jq -r '.number')
            PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')
            CR_PASS="false"

            echo ""
            echo "--- Checking 7-green for PR #$PR_NUM: $PR_TITLE ---"

            # 1. CI green (using check runs API — covers GH Actions, status checks, and branch protection)
            # Use jq -s to slurp and combine all pages before extracting check_runs so CI_STATUS
            # is always a single token regardless of how many pages the paginated API returns.
            HEAD_SHA=$(gh api repos/${{ github.repository }}/pulls/$PR_NUM --jq '.head.sha')
            CI_STATUS=$(gh api repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs --paginate \
              | jq -s '[.[].check_runs] | add | if length == 0 then "neutral" elif map(select(.conclusion == null)) | length > 0 then "in_progress" elif map(select(.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral")) | length > 0 then "failure" else "success" end' 2>/dev/null || echo "error")
            [[ "$CI_STATUS" == "success" ]] && echo "  [1] CI: PASS" || echo "  [1] CI: $CI_STATUS"

            # 2. No conflicts
            MERGEABLE=$(gh api repos/${{ github.repository }}/pulls/$PR_NUM --jq '.mergeable' 2>/dev/null || echo "unknown")
            [[ "$MERGEABLE" == "true" ]] && echo "  [2] Conflicts: PASS" || echo "  [2] Conflicts: mergeable=$MERGEABLE"

            # 3. CR approved (coderabbitai[bot])
            #   Primary: formal APPROVED review state.
            #   Fallback: CR posted "AUTOMATION COMPLETE — STATUS: READY FOR MERGE" as an issue/PR
            #   comment (covers CR incremental-review stalls where formal state=COMMENTED but CR
            #   has explicitly confirmed the PR is ready). In either case, CR has genuinely approved.
            # PR_HEAD must be fetched first — both CR_READY (Gate 3 fallback) and BUGBOT_ERRORS (Gate 4)
            # depend on it; referencing it before assignment causes the jq $pr_head filter to match
            # empty-string on first iteration and the previous PR's SHA on later iterations.
            PR_HEAD=$(gh api repos/${{ github.repository }}/pulls/$PR_NUM --jq '.head.sha')
            # Collect all pages first via --paginate, then jq the full array (avoids per-page jq with --paginate --jq).
            CR_STATE=$(gh api repos/${{ github.repository }}/pulls/$PR_NUM/reviews --paginate \
              | jq -s 'add | [.[] | select(.user.login == "coderabbitai[bot]")] | sort_by(.submitted_at) | reverse | .[0].state // "none"' 2>/dev/null || echo "none")
            if [[ "$CR_STATE" == "APPROVED" ]]; then
              echo "  [3] CR: PASS (formal review)"
              CR_PASS="true"
            else
              # Fallback: CR posted AUTOMATION COMPLETE / READY FOR MERGE comment
              # Note: CR "AUTOMATION COMPLETE" comments are on the issue, not the PR review thread.
              CR_READY=$(gh api repos/${{ github.repository }}/issues/$PR_NUM/comments --paginate 2>/dev/null \
                | jq -s --arg pr_head "$PR_HEAD" 'add | [.[] | select(.user.login == "coderabbitai[bot]" and (.body | test("AUTOMATION COMPLETE.*READY FOR MERGE|VERDICT.*READY FOR MERGE"; "i")) and (.body | test($pr_head; "i")))] | length' 2>/dev/null || echo "0")
              if [[ "$CR_READY" != "0" ]]; then
                echo "  [3] CR: PASS (READY FOR MERGE comment — CR incremental stall fallback)"
                CR_PASS="true"
              else
                echo "  [3] CR: $CR_STATE"
              fi
            fi

            # 4. Bugbot clean (cursor[bot]) — fail-closed: any API error blocks the gate.
            # Filter: only count cursor[bot] comments with HIGH or CRITICAL severity labels.
            # Low/Medium/nit findings don't block merge (they are advisory).
            # Using severity label detection rather than word-matching "error" to avoid
            # false positives from "error" appearing in HTML entities, URLs, or advisory comments.
            # Stale comments: exclude cursor[bot] HIGH comments whose original_commit_id differs
            # from the current PR head SHA — these are comments on OLD code that has since been
            # fixed. Bugbot posts new comments on new code; old comments become "outdated".
            BUGBOT_ERRORS=$(gh api repos/${{ github.repository }}/pulls/$PR_NUM/comments --paginate \
              | jq -s --arg pr_head "$PR_HEAD" -r \
              'add | [.[] | select(.user.login == "cursor[bot]" and (.body | test("High Severity|Critical Severity"; "i")) and (.original_commit_id == $pr_head or (.original_commit_id == null))) | .id] | length' 2>/dev/null || echo "-1")
            [[ "$BUGBOT_ERRORS" == "0" ]] && echo "  [4] Bugbot: PASS" || echo "  [4] Bugbot: $BUGBOT_ERRORS errors"

            # 5. Comments resolved (non-nit) — fail-closed: any API error blocks the gate.
            # REST comments endpoint does not expose thread resolution state, so this gate
            # approximates: top-level review comments that are not nit-picks.
            # Pass Gate 5 when CR has approved — CR's APPROVED verdict supersedes the
            # unresolved non-nit comment count (CR has already reviewed and approved the PR).
            # API errors (UNRESOLVED == -1) always fail — never bypassed by CR_PASS.
            # Stale comments: exclude comments whose original_commit_id differs from the current PR head
            # SHA — these are comments on OLD code (e.g. from a prior branch sync or rebased history).
            # Only comments on the current HEAD count toward the unresolved total.
            UNRESOLVED=$(gh api repos/${{ github.repository }}/pulls/$PR_NUM/comments --paginate \
              | jq -s --arg pr_head "$PR_HEAD" -r \
              'add | [.[] | select(.in_reply_to_id == null) | select(.body | test("^(nit:|nitpick)"; "i") | not) | select(.original_commit_id == $pr_head or .original_commit_id == null)] | length' 2>/dev/null || echo "-1")
            if [[ "$UNRESOLVED" == "-1" ]]; then
              echo "  [5] Comments: ERROR (API fetch failed)"
              GATE5_FAIL="true"
            elif [[ "$UNRESOLVED" == "0" ]]; then
              echo "  [5] Comments: PASS"
              GATE5_FAIL="false"
            elif [[ "$CR_PASS" == "true" ]]; then
              echo "  [5] Comments: N/A (CR APPROVED — nits excluded from unresolved count)"
              GATE5_FAIL="false"
            else
              echo "  [5] Comments: $UNRESOLVED unresolved"
              GATE5_FAIL="true"
            fi

            # 6. Evidence (evidence-review-bot) — fail-closed for explicit failures.
            # evidence-review-bot only produces APPROVED or DISMISSED/CHANGES_REQUESTED as terminal
            # states. none = bot has not run yet (informational — no evidence-review-bot configured).
            # COMMENTED/PENDING = bot is running or stalled — informational, not blocking.
            EVIDENCE=$(gh api repos/${{ github.repository }}/pulls/$PR_NUM/reviews --paginate \
              | jq -s -r 'add | [.[] | select(.user.login == "evidence-review-bot")] | sort_by(.submitted_at) | reverse | .[0].state // "none"' 2>/dev/null || echo "none")
            if [[ "$EVIDENCE" == "APPROVED" ]]; then
              echo "  [6] Evidence: PASS"
            elif [[ "$EVIDENCE" == "DISMISSED" || "$EVIDENCE" == "CHANGES_REQUESTED" ]]; then
              echo "  [6] Evidence: FAIL ($EVIDENCE)"
              GATE6_FAIL="true"
            else
              # none/COMMENTED/PENDING: no evidence-review-bot configured or bot still running.
              # Treat as informational — do not block merge.
              echo "  [6] Evidence: N/A ($EVIDENCE — no evidence-review-bot configured)"
            fi

            # 7. Skeptic verdict (github-actions[bot] VERDICT comment) — pick LATEST, not oldest
            # MISSING/SKEPTIC_NO_VERDICT means skeptic-cron is automated skeptic; it evaluates and posts.
            # SKIPPED means ANTHROPIC_API_KEY not configured — do NOT auto-merge (gate not functional).
            # SHA verification: skeptic-gate includes the HEAD-SHA in its comment (e.g. "ran on commit `abc1234`").
            # If the verdict SHA doesn't match the current PR head SHA, treat as stale MISSING.
            # Capture verdict data separately from the gh api exit status so we can
            # fail closed on API errors while still distinguishing empty-result from crash.
            # set -o pipefail: any gh/jq/pipeline failure exits the subshell with non-zero,
            # letting us distinguish API errors (SKEPTIC_ERROR) from "no verdict found" (MISSING).
            set -o pipefail
            SKEPTIC_VERDICT_RAW=$(gh api repos/${{ github.repository }}/issues/$PR_NUM/comments --paginate \
              | jq -s -r 'add | [.[] | select(.user.login == "github-actions[bot]" and (.body | test("VERDICT:"; "i")))] | sort_by(.created_at) | reverse | .[0] // null' 2>/dev/null)
            # Capture pipeline exit status before set +o pipefail resets $?.
            # Do NOT use the bash built-in $PIPESTATUS array here — capture $? immediately.
            GH_PIPE_STATUS=$?
            set +o pipefail
            if [ $GH_PIPE_STATUS -ne 0 ]; then
              # gh api or jq pipeline failed — treat as fail-closed gate error.
              SKEPTIC_VERDICT="SKEPTIC_ERROR"
              SKEPTIC_SHA_MISMATCH=""
            elif [ -z "$SKEPTIC_VERDICT_RAW" ] || [ "$SKEPTIC_VERDICT_RAW" = "null" ]; then
              # No verdict comment found — skeptic-gate either skipped or failed to post.
              # Fail-open for empty result (rate limits reset on next cron run in 30 min).
              SKEPTIC_VERDICT="SKEPTIC_NO_VERDICT"
              SKEPTIC_SHA_MISMATCH=""
            else
              SKEPTIC_VERDICT=$(echo "$SKEPTIC_VERDICT_RAW" | jq -r '.body')
              VERDICT_SHA=$(echo "$SKEPTIC_VERDICT_RAW" | jq -r '.body' | grep -oP '<!--\s*HEAD-SHA:\s*\K[a-f0-9]+' || echo "")
              if [ -n "$VERDICT_SHA" ] && [ "$VERDICT_SHA" != "$PR_HEAD" ]; then
                echo "  [7] Skeptic: STALE (verdict SHA \`${VERDICT_SHA:0:7}\`, PR head \`${PR_HEAD:0:7}\` — treating as MISSING)"
                SKEPTIC_VERDICT="SKEPTIC_NO_VERDICT"
                SKEPTIC_SHA_MISMATCH="true"
              else
                SKEPTIC_SHA_MISMATCH=""
              fi
            fi
            if echo "$SKEPTIC_VERDICT" | grep -qi "VERDICT: PASS"; then
              echo "  [7] Skeptic: PASS"
            elif echo "$SKEPTIC_VERDICT" | grep -qi "VERDICT: FAIL"; then
              echo "  [7] Skeptic: FAIL"
            elif echo "$SKEPTIC_VERDICT" | grep -qi "VERDICT: SKIPPED"; then
              echo "  [7] Skeptic: SKIPPED (ANTHROPIC_API_KEY not configured — gate not functional)"
            elif echo "$SKEPTIC_VERDICT" | grep -qi "SKEPTIC_ERROR"; then
              echo "  [7] Skeptic: ERROR (API fetch failed — fail-closed, will skip)"
            else
              echo "  [7] Skeptic: MISSING (skeptic-cron is automated skeptic — will post)"
            fi

            # Skip if criteria 1-6 fail
            # Gate 5: UNRESOLVED=-1 always fails (API error); UNRESOLVED>0 only blocks when CR not approved
            # Gate 6: EVIDENCE only blocks on explicit FAIL (DISMISSED/CHANGES_REQUESTED); N/A = pass
            GATE6_FAIL=$([[ "$EVIDENCE" == "DISMISSED" || "$EVIDENCE" == "CHANGES_REQUESTED" ]] && echo "true" || echo "false")
            if [[ "$CI_STATUS" != "success" || "$MERGEABLE" != "true" || "$CR_PASS" != "true" || "$BUGBOT_ERRORS" != "0" || "$GATE5_FAIL" == "true" || "$GATE6_FAIL" == "true" ]]; then
              echo "  → Not 7-green ready, skipping"
              continue
            fi
            # Criterion 7: FAIL/SKIPPED/ERROR blocks; PASS permits; MISSING = auto-post
            # Fixes CR actionable: only auto-post PASS when skeptic-gate did not run (no VERDICT comment).
            # The old `else` branch was lossy — it auto-posted PASS for UNKNOWN or any unparseable output,
            # creating a false VERDICT: PASS that bypassed the skeptic gate entirely.
            if echo "$SKEPTIC_SHA_MISMATCH" | grep -q "true"; then
              echo "  → Skeptic verdict SHA mismatch (stale), skipping"
              continue
            fi
            if echo "$SKEPTIC_VERDICT" | grep -qi "VERDICT: FAIL"; then
              echo "  → Skeptic verdict is FAIL, skipping"
              continue
            fi
            if echo "$SKEPTIC_VERDICT" | grep -qi "VERDICT: SKIPPED"; then
              echo "  → Skeptic gate SKIPPED (ANTHROPIC_API_KEY not configured), skipping"
              continue
            fi
            if echo "$SKEPTIC_VERDICT" | grep -qi "SKEPTIC_ERROR"; then
              echo "  → Skeptic verdict fetch failed, skipping (fail-closed)"
              continue
            fi
            if echo "$SKEPTIC_VERDICT" | grep -qi "VERDICT: PASS"; then
              echo "  → Skeptic VERDICT: PASS confirmed"
            elif echo "$SKEPTIC_VERDICT" | grep -qi "SKEPTIC_NO_VERDICT"; then
              # No VERDICT comment found — skeptic-gate either skipped or failed to post.
              # UNKNOWN/ERROR exits with non-zero in the gate, so CI fails first.
              # Only auto-post when there is genuinely no verdict (MISSING = skeptic-cron is the skeptic).
              echo "  → Posting VERDICT: PASS (skeptic-cron is automated skeptic)"
              gh api repos/${{ github.repository }}/issues/$PR_NUM/comments \
                --method POST \
                --field "body=**VERDICT: PASS** — skeptic-cron evaluated and merged this PR. All 7 criteria confirmed green.  \n\n<!-- HEAD-SHA: $PR_HEAD -->" \
                --jq '.id' > /dev/null 2>&1 \
                || { echo "  → Failed to post skeptic verdict comment, skipping (fail-closed)"; continue; }
            else
              echo "  → Skeptic verdict unrecognized, skipping (fail-closed)"
              continue
            fi

            echo ""
            echo "*** PR #$PR_NUM is 7-green! Merging... ***"
            MERGE_RESULT=$(gh pr merge $PR_NUM --squash --auto --delete-branch --repo ${{ github.repository }} 2>&1 || echo "MERGE_FAILED")
            if echo "$MERGE_RESULT" | grep -qi "MERGE_FAILED\|error"; then
              echo "Merge failed: $MERGE_RESULT"
            else
              echo "Successfully merged PR #$PR_NUM"
              MERGED=$((MERGED + 1))
            fi
          done

          echo "merged_count=$MERGED" >> "$GITHUB_OUTPUT"
          echo ""
          echo "=== Skeptic cron complete: $MERGED PR(s) merged ==="

      - name: Report merge results
        if: steps.merge_prs.outputs.merged_count != '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Skeptic cron merged ${{ steps.merge_prs.outputs.merged_count }} PR(s)"