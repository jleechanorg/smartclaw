name: CodeRabbit ping on push

on:
  push:
    branches-ignore:
      - main
      - master

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: coderabbit-ping-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  ping-coderabbit:
    if: github.event.repository.fork == false
    runs-on: ${{ fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - name: Comment on matching open PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');

            // Skip tag pushes
            if (context.ref.startsWith('refs/tags/')) {
              core.info('Skipping tag push');
              return;
            }

            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              per_page: 10,
            });

            if (!prs.length) {
              core.info(`No open PR for branch ${branch}; skipping.`);
              return;
            }

            const body = '@coderabbitai review';

            for (const pr of prs) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });
              core.info(`Commented on PR #${pr.number}`);
            }
