  agent-orchestrator:
    name: agent-orchestrator fork
    repo: jleechanorg/agent-orchestrator
    path: ~/project_agento/agent-orchestrator
    defaultBranch: main
    sessionPrefix: ao
    workspace: worktree
    worktreeDir: ~/.worktrees/agent-orchestrator-main
    backfillAllPRs: true
    agent: minimax
    agentConfig:
      permissions: skip
    agentRules: >
      **COMMIT MESSAGE PREFIX — MANDATORY:**

      ALL commits and PR titles MUST start with '[agento]'.

      Format: '[agento] type: description'

      Examples: '[agento] fix: address CR comments', '[agento] feat: add merge
      gate'

      NEVER omit this prefix.


      You are working in the jleechanorg/agent-orchestrator fork — a
      TypeScript/Node.js monorepo.

      Always run `pnpm test` before pushing (or `pnpm -C packages/core test` for
      core changes).

      Use conventional commits (feat:, fix:, chore:, docs:).

      Never push to main directly — always open a PR.

      Never use git add -A; stage only files you changed.

      Once primary code is written and the PR is ready to finalize for merge:
      use /copilot to process all GitHub review comments, then /fixpr to fix any
      remaining issues. After every push, post "@coderabbitai all good?" and
      wait for CodeRabbit.

      If CodeRabbit posts REQUEST_CHANGES, fix every actionable item and push
      again (do not run /er yet). If CodeRabbit posts APPROVE or LGTM, run /er
      and wait for /er to complete before declaring done. Do not stop until
      CodeRabbit posts APPROVE or LGTM.


      **NEVER MERGE — THE ORCHESTRATOR MERGES:**

      NEVER run `gh pr merge` or any equivalent merge command. NEVER use the
      GitHub

      UI or API to merge a PR. Your job ends when the PR is green (all 6
      conditions

      met). When green, post a PR comment: "PR is green ✅ (6/6 criteria met —

      awaiting orchestrator merge)" then stop. The orchestrator handles merging.


      **If your PR is already merged:** run `gh pr view --json state --jq
      .state` —

      if the result is MERGED or CLOSED, exit immediately. Do not continue
      working on it.


      **REBASE AND FORCE-PUSH — ALLOWED for your PR branch:**

      You MAY rebase your PR branch onto main and force-push with `git push
      --force-with-lease origin <your-branch>` to resolve merge conflicts. This
      is safe — it's YOUR branch. Do NOT ask for permission. Do NOT force-push
      to main.


      **NEVER CLOSE A PR:**

      NEVER run `gh pr close` or close a PR via the GitHub API. If the PR has
      merge conflicts, rebase it. If the PR is fundamentally broken, post a
      comment explaining why and leave it open for human decision.


      **PRE-EXISTING CI FAILURES — COORDINATE, DON'T STOP:**

      If CI checks fail and you determine they are pre-existing (failing on main
      before your PR), do NOT silently stop or declare "nothing to do". Instead:

      1. Verify the failure exists on main: `gh run list --branch main --repo
      jleechanorg/agent-orchestrator --limit 3`

      2. Send MCP mail to project_key="smartclaw" with subject "Pre-existing
      CI failure: <check-name>" and body describing the failure, which check,
      and what you observed.

      3. Attempt to fix the failure on main via a separate PR — create a new
      branch from main, fix the root cause, open a PR, and send MCP mail with
      the PR link.

      4. If the fix is outside your expertise (e.g. CI infra, runner config),
      send MCP mail to escalate: subject "Escalation: CI failure needs infra fix
      — <check-name>" and describe what you found.

      5. Only stop after sending MCP mail AND either opening a fix PR or
      escalating. Never stop silently.


      **MCP MAIL BEFORE STOPPING — MANDATORY:**

      Before ending any session (whether PR is green, blocked, or you've
      determined nothing to do):

      1. Send MCP mail:
      mcp__mcp-agent-mail__send_message(project_key="smartclaw",
      sender_name="agento", subject="Session complete: <PR title>",
      body_md="<outcome summary, blockers, any pre-existing issues found>")

      2. Only then stop.
