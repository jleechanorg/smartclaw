      without any commit push. Recommend manual intervention on jleechanorg/agent-orchestrator
      to unblock autonomy and prevent repeated no-op retries.'
  agent-exited:
    auto: true
    action: send-to-agent
    priority: urgent
    retries: 3
    escalateAfter: 2
    message: 'The previous agent session has ended. Triage the PR before doing anything
      else: (1) Run `gh pr view --json state --jq .state` — if MERGED or CLOSED, exit
      immediately. (2) Check if the PR is already green — verify all 7 conditions:
      (a) CI passing, (b) mergeable (no conflicts), (c) CR genuinely APPROVED, (d)
      Bugbot neutral/success, (e) all review threads resolved, (f) evidence review
      PASS (run /er via evidence-reviewer subagent, require PASS, post as PR comment).
      If ALL 6 pass: post ''PR is green (7/7 criteria met — awaiting auto-merge)''
      if not already posted, then exit. (3) If ANY of the above conditions is not
      yet met, there is work to do: identify the highest-priority blocker (CI failure
      > merge conflict > CR CHANGES_REQUESTED > Bugbot findings > unresolved threads)
      and fix it. Do not restart from scratch — read the PR description and existing
      comments to understand what was already done.'
  session-spawned:
    auto: false
    action: notify
    priority: action
    message: AO worker {{sessionId}} started — project {{projectId}}. Routing to mcp-mail
