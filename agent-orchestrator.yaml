notifiers:
  openclaw:
    plugin: openclaw
    url: http://127.0.0.1:18789/hooks/agent
    token: ${OPENCLAW_AO_HOOK_TOKEN}
    retries: 3
    retryDelayMs: 5000
    sessionKeyPrefix: "hook:ao:"
  orchestrator:
    plugin: webhook
    url: http://127.0.0.1:19888/ao-notify
    token: ${OPENCLAW_AO_NOTIFY_TOKEN}
    retries: 2
    retryDelayMs: 3000
  webhook:
    plugin: webhook
    url: http://localhost:19888/ao-notify
    token: ${OPENCLAW_HOOKS_TOKEN}
  slack:
    plugin: slack
    webhookUrl: ${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/PLACEHOLDER}
notificationRouting:
  urgent:
    - openclaw
    - orchestrator
    - slack
  action:
    - openclaw
    - orchestrator
    - slack
  warning:
    - openclaw
  info:
    - openclaw
reactions:
  ci-failed:
    auto: true
    action: send-to-agent
    message: CI has failed. {{context}} Fix the failing checks and push.
    retries: 3
    escalateAfter: 2
  changes-requested:
    auto: true
    action: send-to-agent
    message: Changes have been requested on your PR. {{context}} Address each
      comment, push fixes, then post @coderabbitai all good?
    escalateAfter: 10m
  bugbot-comments:
    auto: true
    action: send-to-agent
    escalateAfter: 30m
  merge-conflicts:
    auto: true
    action: send-to-agent
    message: Your branch has merge conflicts. Rebase on the default branch, resolve
      all conflicts (prefer incoming changes for formatting/style, prefer your
      changes for functional logic), then post a PR comment listing each
      conflicted file and which side you chose and why. Push the resolved
      branch.
    escalateAfter: 30m
  approved-and-green:
    auto: true
    action: send-to-agent
    message: "CodeRabbit has approved — but VERIFY it is genuine first. Run: gh api
      repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/reviews --paginate | jq -s '[.[][]
      | select(.user.login==\"coderabbitai[bot]\")] | .[-2:] | map(select(. !=
      null) | {state, body_len: (.body // \"\" | length), submitted_at})' —
      genuine = COMMENTED(body>0) within 10s before APPROVED, or first/only
      review with no prior CHANGES_REQUESTED. If neither pattern matches, the
      APPROVED is fake (thread resolution). Post @coderabbitai all good? to get
      a real re-review. Then verify ALL 6 green conditions: (1) CI: gh pr view
      <PR_NUMBER> --repo <OWNER>/<REPO> --json statusCheckRollup --jq
      '[.statusCheckRollup[]|select(.conclusion==\"FAILURE\")]' must be empty.
      (2) Mergeable: gh pr view <PR_NUMBER> --repo <OWNER>/<REPO> --json
      mergeable --jq '.mergeable' must be MERGEABLE. (3) CR genuinely approved —
      see above. (4) Bugbot: gh pr checks <PR_NUMBER> --repo <OWNER>/<REPO> |
      grep -i bugbot — must show neutral or success, not failure. (5) ALL inline
      comments cleared (even post-APPROVED): first get the approval timestamp:
      APPROVAL_TS=$(gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/reviews
      --paginate | jq -rs '[.[][] | select(.user.login==\"coderabbitai[bot]\"
      and .state==\"APPROVED\")] | last | .submitted_at') then count only
      post-approval CR blockers: gh api
      repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments --paginate | jq -rs --arg
      ts \"$APPROVAL_TS\" '[.[][] | select(.user.login==\"coderabbitai[bot]\") |
      select(.created_at > $ts) | select(.body | test(\"Major|Critical\"))] |
      length' — must be 0; pre-approval comments were already addressed by the
      push that triggered re-review. Also check ALL reviewers: use GraphQL: gh
      api graphql -f
      query='{repository(owner:\"<OWNER>\",name:\"<REPO>\"){pullRequest(number:\
      <PR_NUMBER>){reviewThreads(first:100){nodes{isResolved}}}}}' --jq
      '[.data.repository.pullRequest.reviewThreads.nodes[] |
      select(.isResolved==false)] | length' — must be 0 unresolved. (6) Evidence
      gate: run /er and confirm PASS. Only when all 6 pass: post 'PR is green —
      awaiting orchestrator merge.' DO NOT run gh pr merge."
    priority: action
  worker-signals-completion:
    auto: true
    action: skeptic-review
    skepticModel: claude
    skepticPostComment: true
  agent-stuck:
    auto: true
    action: send-to-agent
    threshold: 30m
    message: "You appear to be idle for 30+ minutes. {{context}} Before stopping,
      verify your PR is truly green: (1) gh pr view <PR_NUMBER> --repo
      <OWNER>/<REPO> --json mergeable,statusCheckRollup (2) Verify CR approval
      is genuine (paired-review detection): gh api
      repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/reviews --paginate | jq -s '[.[][]
      | select(.user.login==\"coderabbitai[bot]\")] | .[-2:] | map(select(. !=
      null) | {state, body_len: (.body // \"\" | length), submitted_at})' —
      genuine = COMMENTED(body>0) within 10s before APPROVED, or first/only
      review with no prior CHANGES_REQUESTED. If fake, post @coderabbitai all
      good? (3) Check for post-APPROVED CR inline blockers: first get approval
      timestamp: APPROVAL_TS=$(gh api
      repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/reviews --paginate | jq -rs '[.[][]
      | select(.user.login==\"coderabbitai[bot]\" and .state==\"APPROVED\")] |
      last | .submitted_at') then count only post-approval blockers: gh api
      repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments --paginate | jq -rs --arg
      ts \"$APPROVAL_TS\" '[.[][] | select(.user.login==\"coderabbitai[bot]\") |
      select(.created_at > $ts) | select(.body | test(\"Major|Critical\"))] |
      length' — must be 0; pre-approval comments were already addressed. (4) If
      truly done, post a PR comment: PR is green."
    escalateAfter: 1h
  agent-needs-input:
    auto: true
    action: send-to-agent
    message: You appear to be waiting. {{context}} Check the items above and
      continue with the next unresolved item. If everything is resolved,
      summarize what you completed in a PR comment.
    escalateAfter: 30m
  review-requested:
    auto: true
    action: send-to-agent
    message: "Coder agent signaled PR ready for review. Dispatch reviewer_agent to
      run independent review: python -m orchestration.reviewer_agent <OWNER>
      <REPO> <PR_NUMBER> --coder-agent <CODER_NAME>. Reviewer uses a different
      model family than the coder."
    priority: action
  agent-exited:
    auto: true
    action: notify
    priority: urgent
