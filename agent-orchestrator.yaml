reactions:
  ci-failed:
    auto: true
    action: send-to-agent
    message: CI has failed. {{context}} Fix the failing checks and push.
    retries: 3
    escalateAfter: 2
  changes-requested:
    auto: true
    action: send-to-agent
    retries: 2
    message: 'Changes have been requested on this PR. {{context}} Run `scripts/extract-unresolved-comments.sh
      <OWNER>/<REPO> <PR>` to get prioritized unresolved CR comments (Critical first).
      Fix exactly those items only — no other changes. Commit with `[agento]`, push.
      Then run `scripts/cr-loop-guard.sh <OWNER>/<REPO> <PR> fix-mode`: if output
      starts with `cr-trigger`, post `@coderabbitai all good?`; if `copilot-expanded`,
      run `/copilot-expanded` on the exact comment list; if `skip`, exit (no SHA progress,
      loop limit reached — escalate).'
    escalateAfter: 5m
  bugbot-comments:
    auto: true
    action: send-to-agent
    retries: 2
    escalateAfter: 30m
  merge-conflicts:
    auto: true
    action: send-to-agent
    retries: 2
    message: Your branch has merge conflicts. Rebase on the default branch, resolve
      all conflicts (prefer incoming changes for formatting/style, prefer your changes
      for functional logic), then post a PR comment listing each conflicted file and
      which side you chose and why. Push the resolved branch.
    escalateAfter: 30m
  approved-and-green:
    auto: true
    action: auto-merge
    message: 'IMPORTANT — CHECK BEFORE DOING ANYTHING: First check if this PR is already
      confirmed green: (1) `gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER> --jq ''{reviewDecision,
      mergeable}''` — if reviewDecision is null AND mergeable is true AND the PR has
      a ''PR is green'' comment already posted (check: `gh api repos/<OWNER>/<REPO>/issues/<PR_NUMBER>/comments
      --jq ''[.[] | select(.body | test("PR is green"; "i"))] | last''`), skip all
      verification — just confirm the PR is still green and exit. (2) Only if no ''PR
      is green'' comment exists yet: proceed with full 7-green verification below.
      CodeRabbit has approved — but VERIFY it is genuine first. Run: gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/reviews
      --paginate | jq -s ''[.[][] | select(.user.login=="coderabbitai[bot]")] | .[-2:]
      | map(select(. != null) | {state, body_len: (.body // "" | length), submitted_at})''
      — genuine = COMMENTED(body>0) within 10s before APPROVED, or first/only review
      with no prior CHANGES_REQUESTED. If neither pattern matches, the APPROVED is
      fake (thread resolution). Post @coderabbitai all good? to get a real re-review.
      Then verify ALL 7 green conditions: (1) CI: gh pr view <PR_NUMBER> --repo <OWNER>/<REPO>
      --json statusCheckRollup --jq ''[.statusCheckRollup[]|select(.conclusion=="FAILURE")]''
      must be empty. (2) Mergeable: gh pr view <PR_NUMBER> --repo <OWNER>/<REPO> --json
      mergeable --jq ''.mergeable'' must be MERGEABLE. (3) CR genuinely approved —
      see above. (4) Bugbot: gh pr checks <PR_NUMBER> --repo <OWNER>/<REPO> | grep
      -i bugbot — must show neutral or success, not failure. (5) ALL inline comments
      cleared (even post-APPROVED): first get the approval timestamp: APPROVAL_TS=$(gh
      api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/reviews --paginate | jq -rs ''[.[][]
      | select(.user.login=="coderabbitai[bot]" and .state=="APPROVED")] | last |
      .submitted_at'') then count only post-approval CR blockers: gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments
      --paginate | jq -rs --arg ts "$APPROVAL_TS" ''[.[][] | select(.user.login=="coderabbitai[bot]")
      | select(.created_at > $ts) | select(.body | test("Major|Critical"))] | length''
      — must be 0; pre-approval comments were already addressed by the push that triggered
      re-review. Also check ALL reviewers: use GraphQL: gh api graphql -f query=''{repository(owner:"<OWNER>",name:"<REPO>"){pullRequest(number:<PR_NUMBER>){reviewThreads(first:100){nodes{isResolved}}}}}''
      --jq ''[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved==false)]
      | length'' — must be 0 unresolved (note: first:100 covers up to 100 threads;
      PRs with >100 threads are rare but if encountered, add pagination via pageInfo{hasNextPage,endCursor}).
      (6) Evidence gate: run /er via evidence-reviewer subagent (headless) — spawn
      it with Agent tool (subagent_type=evidence-reviewer), collect PASS/WARN/FAIL
      verdict, post as PR comment. ALL PRs require evidence review. Only when all
      7 pass: post ''PR is green (7/7 criteria met — awaiting auto-merge)''. DO NOT
      run gh pr merge.


      **IMPORTANT — Skeptic SKIPPED guard**: The auto-merge reaction (verify6Green
      gate 7) always passes skepticRequired=false so skeptic is NOT enforced here.
      skeptic-cron.yml runs skeptic evaluation via AO worker separately. Before posting
      the green signal above, verify skeptic has actually posted VERDICT:PASS on this
      PR at this SHA: check PR comments for SKEPTIC_BOT_AUTHOR with VERDICT:PASS.
      If skeptic VERDICT is SKIPPED or absent, DO NOT post green signal — skeptic-cron
      will handle it. Posting green for a SKIPPED skeptic bypasses the independent
      LLM evaluation entirely.'
    priority: action
  agent-stuck:
    auto: true
    action: send-to-agent
    threshold: 15m
    message: "[ -z \"{{pr_number}}\" ] && echo \"No PR context — idle exit\" && exit\
      \ 0\nSTEP 0: gh pr view {{pr_number}} --repo {{owner}}/{{repo}} --jq '{state,merged}'\n\
      \  → MERGED/CLOSED: exit. STEP 1: scripts/cr-loop-guard.sh {{owner}}/{{repo}}\
      \ {{pr_number}} fix-mode\n  → cr-trigger: post @coderabbitai all good?; copilot-expanded:\
      \ /copilot-expanded; skip: exit\n  (loop limit reached — escalate). STEP 2:\
      \ CI failing? Fix + push. STEP 3: 7-green met? green-signal.\n  STEP 4: merge.\
      \ Escalate if loop limit reached without SHA progress.\n"
    escalateAfter: 1h
  agent-needs-input:
    auto: true
    action: send-to-agent
    message: '[ -z "{{pr_number}}" ] && echo "No PR context — idle exit" && exit 0

      You appear to be waiting. (1) Run `gh pr view --json state --jq .state` against
