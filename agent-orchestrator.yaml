dataDir: ~/.agent-orchestrator
worktreeDir: ~/.worktrees
port: 3020
defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers: [desktop, openclaw]
  agentRules: "# Procedures: https://github.com/jleechanorg/agent-orchestrator/tree/main/.claude/procedures/\n\
    # TL;DR: [agento] commits, 7-green loop, cr-loop-guard gates @coderabbitai all\
    \ good?\n# Full steps: ~/.smartclaw/procedures/7green.md + cr-resolution.md\n\n\
    **COMMIT PREFIX:** ALL commits use `[agento]` prefix.\n**PR TERMINATION:** `gh\
    \ pr view <PR> --jq {state,merged}` — if MERGED/CLOSED, exit immediately.\n**7-GREEN\
    \ LOOP:** CI → fix → push → cr-loop-guard.sh → @coderabbitai all good? → CR APPROVED\
    \ → /er → merge.\n**CR-LOOP-GUARD:** Before @coderabbitai all good?, run scripts/cr-loop-guard.sh\
    \ fix-mode.\n  cr-trigger: post @coderabbitai all good?; copilot-expanded: /copilot-expanded;\
    \ skip: escalate.\n**/er MANDATORY:** After CR APPROVED, run /er (evidence-reviewer\
    \ subagent, headless) — PASS required.\n**NO IDLE:** Never exit without pushing\
    \ fixes or escalating. Sessions idle > 15 min trigger agent-stuck.\n\n**DEFINITION\
    \ OF \"GREEN\" PR (all 7 must hold before merge):** 1. CI green — all checks SUCCESS\
    \ 2. No conflicts — mergeable=MERGEABLE 3. CR APPROVED — coderabbitai[bot] latest\
    \ review state=APPROVED 4. Bugbot clean — cursor[bot] zero error-severity comments\
    \ 5. Comments resolved — zero unresolved non-nit inline comments 6. Evidence pass\
    \ — evidence-review-bot APPROVED or evidence-gate CI passed 7. Skeptic PASS\n\n\
    **POST-APPROVAL INLINE COMMENTS:** After CR APPROVED, check for lingering inline\
    \ comments. Critical/Major: must fix before merge. Minor/Nit: resolve thread, no\
    \ code change required.\n\n**MCP MAIL BEFORE STOPPING — MANDATORY:** Before ending\
    \ any session: mcp__mcp-agent-mail__send_message(project_key=\"smartclaw\",\
    \ sender_name=\"claude\", subject=\"Session complete\", body_md=\"<outcome>\").\n    \ **SLASH COMMAND DISCOVERY (for Codex and agents that do NOT natively support Claude slash commands):**\n    \ If your agent runtime does NOT natively support slash commands (unlike Claude Code, MiniMax, or Cursor CLI — which have built-in slash command systems), and you encounter a slash command (e.g. /er, /fixpr, /simplify, /evidence-review) that you cannot resolve from local files:\n    \ 1. Do a web search for \"site:claude.com <command-name> slash command\" or \"claude code slash command reference\"\n    \ 2. Read the official documentation to understand the command intent, arguments, and behavior\n    \ 3. Translate the command into your runtime equivalent — do NOT ask the user how to translate it\n    \ 4. Execute the translated command autonomously\n    \ 5. If no equivalent exists in your runtime, report what you found and what you would do\n"
  orchestratorRules: "**ZERO-OUTPUT EXIT ALERTING — MANDATORY:**\nWhen a session exits\
    \ (tmux pane closes, agent terminates), check if it produced any output:\n1. Check\
    \ if a PR exists for the session's issue/branch: `gh pr list -R <REPO> --head\
    \ <BRANCH> --json number`\n2. Check if any commits were pushed: `git log origin/main..<BRANCH>\
    \ --oneline 2>/dev/null | wc -l`\n3. If BOTH are zero (no PR AND no commits),\
    \ this is a **zero-output exit** — the session died without doing anything.\n\
    4. On zero-output exit:\n   - Log: `[ALERT] Session <NAME> exited with zero output\
    \ (no PR, no commits) for issue <ID>`\n   - Post to MCP mail: `send_message(subject=\"\
    ALERT: zero-output exit\", body_md=\"Session <NAME> died without creating a PR\
    \ or pushing commits for <ID>. Needs respawn.\")`\n   - Auto-respawn if the session\
    \ has been spawned fewer than 3 times for this issue (prevent infinite respawn\
    \ loops)\n   - After 3 failed spawns: escalate to operator via Slack DM instead\
    \ of respawning\n\n**PR COVERAGE AUDIT — EVERY 15 MINUTES:**\nPeriodically audit\
    \ that every open PR has an active, healthy session:\n1. List open PRs: `gh pr\
    \ list -R <REPO> --state open --json number,title,updatedAt`\n2. List active sessions:\
    \ `ao session ls -p <PROJECT>`\n3. For each PR without a matching session:\n \
    \  - If PR was updated <1h ago: lifecycle-worker may still be claiming it — wait\n\
    \   - If PR was updated >1h ago: spawn a session: `ao spawn --claim-pr <N> -p\
    \ <PROJECT>`\n4. For each session whose PR is merged/closed: kill it: `ao session\
    \ kill <SESSION>`\n\n**LIFECYCLE-WORKER HEALTH CHECK:**\nIf `ao spawn --claim-pr`\
    \ fails with \"git fetch --force\" errors:\n1. Check for stale worktrees: `git\
    \ -C <REPO_PATH> worktree list | grep <branch>`\n2. Remove stale worktrees: `git\
    \ worktree unlock <path> && git worktree remove --force <path>`\n3. Delete stale\
    \ local branch: `git branch -D <branch>`\n4. Retry the spawn\n"
plugins:
  scm-github:
    token: ${GITHUB_TOKEN}
    extraBotAuthors:
    - chatgpt-codex-connector[bot]
    - chatgpt-codex-connector
    - copilot-pull-request-reviewer[bot]
    - copilot-pull-request-reviewer
    - Copilot
    - copilot[bot]
    - cursor
    - coderabbitai[bot]
    - coderabbitai
projects:
  smartclaw:
    name: smartclaw orchestration
    repo: jleechanorg/smartclaw
    path: ~/.smartclaw
    defaultBranch: main
    sessionPrefix: jc
    workspace: worktree
    worktreeDir: ~/.worktrees/smartclaw-main
    backfillAllPRs: true
    agentConfig:
      permissions: skip
      model: claude-sonnet-4-6
    agentRules: 'You are working in the smartclaw orchestration repo.


      **CI UNSTABLE / FAILURE — ACT IMMEDIATELY, NEVER PAUSE:**

      When mergeable_state=unstable OR any CI check shows FAILURE or in_progress:

      - Do NOT ask for permission. Do NOT wait.

      - Immediately run: `gh run list --branch $(git branch --show-current) --repo
      <OWNER>/<REPO> --limit 3` to identify the failing check

      - Then fix it with /copilot or direct code changes.

      - This is a STANDING DIRECTIVE — never pause or ask for approval when CI is
      unstable.

      - After pushing the fix, immediately post `@coderabbitai all good?`


      **AFTER POSTING @coderabbitai all good? — KEEP MONITORING:**

      When you have pushed a fix and asked @coderabbitai all good?:

      - Do NOT stop and wait for human.

      - Continue monitoring. Check CI status every 2 minutes with: `gh pr checks <PR>
      --watch`

      - Loop until CI is green (all checks pass) or red (definite failure).

      - If new CI failures appear: fix them, push, and re-post @coderabbitai all good?

      - Only exit when PR is merged, closed, or you receive explicit human instruction.


      Always run `PYTHONPATH=src python -m pytest tests/test_genesis_config.py tests/test_genesis_cron.py
      tests/test_genesis_memory.py -q` before pushing.

      If the PR touches scripts/ or any file making HTTP calls to external services
      (Ollama, OpenAI, Slack, GitHub), attempt a real smoke test: check if the service
      is available locally first, run the actual code path with minimal input, assert
      output shape. If service unavailable, document it explicitly in the PR description
      under "Testing". Do not silently skip real tests in favour of mocks only.

      Use conventional commits (feat:, fix:, chore:, docs:).

      Never push to main directly — always open a PR.

      Never use git add -A; stage only files you changed.

      Once primary code is written and the PR is ready to finalize for merge: use
      /copilot to process all GitHub review comments, then /fixpr to fix any remaining
      issues. After every push, post "@coderabbitai all good?" and wait for CodeRabbit.

      If CodeRabbit posts REQUEST_CHANGES, fix every actionable item and push again
      (do not run /er yet). If CodeRabbit posts a genuine GitHub `APPROVED` review
      AND criteria 1-7 are met, run /er via evidence-reviewer subagent (headless)
      — spawn it with Agent tool (subagent_type=evidence-reviewer), collect PASS/WARN/FAIL
      verdict, post as PR comment. PASS is mandatory before declaring done — if WARN/FAIL,
      fix issues and re-run. Do not stop until CodeRabbit posts a genuine `APPROVED`
      review and criteria 1-7 are met. Do NOT use /copilot or /fixpr while still actively
      implementing features.

      Before declaring PR ready/done, you MUST verify CodeRabbit review state is APPROVED
      (genuine), not merely COMMENTED.

      After CodeRabbit APPROVED, you MUST check ALL inline comments from ALL reviewers
      (CodeRabbit, Copilot, Bugbot, humans) and resolve every Major/Critical/actionable
      item before declaring done.

      Once criteria 1-7 are met (CI green, no conflicts, CR approved, Bugbot ok, all
      review comments resolved): run /er via evidence-reviewer subagent (headless)
      — spawn it with Agent tool (subagent_type=evidence-reviewer), collect PASS/WARN/FAIL
      verdict, post as PR comment. Only post the green signal ("PR is green (7/7 criteria
      met — awaiting auto-merge)") after /er returns PASS.


      **PR Priority Convention:** PR title must start with [P0], [P1], or [P2]. P0
      = stops autonomy. P1 = breaks green loop. P2 = improvement.

      '
  worldarchitect:
    name: worldarchitect.ai
    repo: jleechanorg/worldarchitect.ai
    path: ~/projects/worldarchitect.ai
    defaultBranch: main
    sessionPrefix: wa
    workspace: worktree
    worktreeDir: ~/.worktrees/worldarchitect-main
    agentConfig:
      permissions: skip
      model: claude-sonnet-4-6
    agentRules: 'You are working in the worldarchitect.ai repo — a Python/Flask game
      backend.

      Always run `python -m pytest tests/ -x -q` before pushing.

      Use conventional commits (feat:, fix:, chore:, docs:).

      Never push to main directly — always open a PR.

      Never use git add -A; stage only files you changed.

      Once primary code is written and the PR is ready to finalize for merge: use
      /copilot to process all GitHub review comments, then /fixpr to fix any remaining
      issues. After every push, post "@coderabbitai all good?" and wait for CodeRabbit.

      If CodeRabbit posts REQUEST_CHANGES, fix every actionable item and push again
      (do not run /er yet). If CodeRabbit posts a genuine GitHub `APPROVED` review
      AND criteria 1-7 are met, run /er via evidence-reviewer subagent (headless)
      — spawn it with Agent tool (subagent_type=evidence-reviewer), collect PASS/WARN/FAIL
      verdict, post as PR comment. PASS is mandatory before declaring done — if WARN/FAIL,
      fix issues and re-run. Do not stop until CodeRabbit posts a genuine `APPROVED`
      review and criteria 1-7 are met. Do NOT use /copilot or /fixpr while still actively
      implementing features.

      Once criteria 1-7 are met (CI green, no conflicts, CR approved, Bugbot ok, all
      review comments resolved): run /er via evidence-reviewer subagent (headless)
      — spawn it with Agent tool (subagent_type=evidence-reviewer), collect PASS/WARN/FAIL
      verdict, post as PR comment. Only post the green signal ("PR is green (7/7 criteria
      met — awaiting auto-merge)") after /er returns PASS.

      '
  agent-orchestrator:
    name: agent-orchestrator fork
    repo: jleechanorg/agent-orchestrator
    path: ${HOME}/project_agento/agent-orchestrator
    defaultBranch: main
    sessionPrefix: ao
    workspace: worktree
    worktreeDir: ~/.worktrees/agent-orchestrator
    backfillAllPRs: true
    tracker:
      plugin: beads
    agentConfig:
      permissions: skip
      model: claude-sonnet-4-6
    agentRules: "**COMMIT MESSAGE PREFIX — MANDATORY:**\nALL commits and PR titles\
      \ MUST start with '[agento]'.\nFormat: '[agento] type: description'\nExamples:\
      \ '[agento] fix: address CR comments', '[agento] feat: add merge gate'\nNEVER\
      \ omit this prefix.\n\n**SPAWN/CAPACITY GATE — MANDATORY BEFORE NEW WORK OR\
      \ GITHUB API BURSTS:**\nBefore spawning new work or making GitHub API calls,\
      \ run:\n- `gh api rate_limit`\n- `tmux list-sessions | wc -l`\nRules:\n- If\
      \ `graphql.remaining < 100`: use REST fallback exclusively (no GraphQL calls).\n\
      - If `core.remaining < 500`: defer non-critical reads/polls until budget recovers.\n\
      - Before dispatching multiple AO workers: if active tmux sessions > 15, do NOT\
      \ spawn; warn and defer.\n\n\nYou are working in the jleechanorg/agent-orchestrator\
      \ fork — a TypeScript/Node.js monorepo.\nAlways run `pnpm test` before pushing\
      \ (or `pnpm -C packages/core test` for core changes).\nUse conventional commits\
      \ (feat:, fix:, chore:, docs:).\nNever push to main directly — always open a\
      \ PR.\nNever use git add -A; stage only files you changed.\nOnce primary code\
      \ is written and the PR is ready to finalize for merge: use /copilot to process\
      \ all GitHub review comments, then /fixpr to fix any remaining issues. After\
      \ every push, post \"@coderabbitai all good?\" and wait for CodeRabbit.\nIf\
      \ CodeRabbit posts REQUEST_CHANGES, fix every actionable item and push again\
      \ (do not run /er yet). If CodeRabbit posts a genuine GitHub `APPROVED` review\
      \ AND criteria 1-7 are met, run /er via evidence-reviewer subagent (headless)\
      \ — spawn it with Agent tool (subagent_type=evidence-reviewer), collect PASS/WARN/FAIL\
      \ verdict, post as PR comment. PASS is mandatory before declaring done — if\
      \ WARN/FAIL, fix issues and re-run. Do not stop until CodeRabbit posts a genuine\
      \ `APPROVED` review and criteria 1-7 are met.\nOnce criteria 1-7 are met (CI\
      \ green, no conflicts, CR approved, Bugbot ok, all review comments resolved):\
      \ run /er via evidence-reviewer subagent (headless) — spawn it with Agent tool\
      \ (subagent_type=evidence-reviewer), collect PASS/WARN/FAIL verdict, post as\
      \ PR comment. Only post the green signal (\"PR is green (7/7 criteria met —\
      \ awaiting auto-merge)\") after /er returns PASS.\n\n**MERGE POLICY:**\nAfter\
      \ posting the green signal, wait 5 minutes, then run `gh pr merge <PR_NUMBER>\
      \ --repo jleechanorg/agent-orchestrator --squash --auto` to enable GitHub auto-merge.\
      \ Do NOT force-merge. If auto-merge fails (e.g. branch protection requires review),\
      \ post a PR comment with the error and stop. Do not exit until confirmed merged\
      \ or you hit a blocker you cannot resolve.\n\n**If your PR is already merged:**\
      \ run `gh pr view --json state --jq .state` —\nif the result is MERGED or CLOSED,\
      \ exit immediately. Do not continue working on it.\n\n**REBASE AND FORCE-PUSH\
      \ — ALLOWED for your PR branch:**\nYou MAY rebase your PR branch onto main and\
      \ force-push with `git push --force-with-lease origin <your-branch>` to resolve\
      \ merge conflicts. This is safe — it's YOUR branch. Do NOT ask for permission.\
      \ Do NOT force-push to main.\n\n**NEVER CLOSE A PR:**\nNEVER run `gh pr close`\
      \ or close a PR via the GitHub API. If the PR has merge conflicts, rebase it.\
      \ If the PR is fundamentally broken, post a comment explaining why and leave\
      \ it open for human decision.\n\n**PRE-EXISTING CI FAILURES — COORDINATE, DON'T\
      \ STOP:**\nIf CI checks fail and you determine they are pre-existing (failing\
      \ on main before your PR), do NOT silently stop or declare \"nothing to do\"\
      . Instead:\n1. Verify the failure exists on main: `gh run list --branch main\
      \ --repo jleechanorg/agent-orchestrator --limit 3`\n2. Send MCP mail to project_key=\"\
      smartclaw\" with subject \"Pre-existing CI failure: <check-name>\" and body\
      \ describing the failure, which check, and what you observed.\n3. Attempt to\
      \ fix the failure on main via a separate PR — create a new branch from main,\
      \ fix the root cause, open a PR, and send MCP mail with the PR link.\n4. If\
      \ the fix is outside your expertise (e.g. CI infra, runner config), send MCP\
      \ mail to escalate: subject \"Escalation: CI failure needs infra fix — <check-name>\"\
      \ and describe what you found.\n5. Only stop after sending MCP mail AND either\
      \ opening a fix PR or escalating. Never stop silently.\n\n**MCP MAIL BEFORE\
      \ STOPPING — MANDATORY:**\nBefore ending any session (whether PR is green, blocked,\
      \ or you've determined nothing to do):\n1. Send MCP mail: mcp__mcp-agent-mail__send_message(project_key=\"\
      smartclaw\", sender_name=\"claude\", subject=\"Session complete: <PR title>\"\
      , body_md=\"<outcome summary, blockers, any pre-existing issues found>\")\n\
      2. Only then stop.\n\n**CR CHANGES_REQUESTED RESOLUTION PROTOCOL (MANDATORY):**\n\
      1. When CodeRabbit review state is CHANGES_REQUESTED, first fetch the exact\
      \ unresolved review comment(s):\n   `gh api repos/jleechanorg/agent-orchestrator/pulls/<PR_NUMBER>/comments`\n\
      2. Identify the unresolved actionable CR item(s) and fix exactly what was requested\
      \ before doing any other optimization/cleanup.\n3. Commit and push only the\
      \ targeted CR-requested fix(es).\n4. Immediately post this PR comment: `@coderabbitai\
      \ all good?`\n5. Wait for CodeRabbit re-review to complete before attempting\
      \ any other green-gate steps (/er, merge-gate checks, or additional non-requested\
      \ changes).\n\n**MERGEABLE=UNKNOWN — FORCE GITHUB TO RECOMPUTE (bd-ara.2):**\n\
      If `gh pr view --json mergeable --jq .mergeable` returns `null` or `gh pr view\
      \ --json mergeableState --jq .mergeableState` returns `unknown`:\n- This means\
      \ GitHub has not computed mergeability (stale branch). Your changes are ready\
      \ — GitHub just hasn't checked.\n- Run: `git fetch origin && git rebase origin/main\
      \ && git push --force-with-lease`\n- The push triggers GitHub to recompute mergeability.\
      \ Check again after 30s with `gh pr view --json mergeable`.\n- If still UNKNOWN\
      \ after push, GitHub may need a second look — try: `gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/update\
      \ --method POST` to force a refresh.\n- NEVER skip this and declare the PR \"\
      not ready\" — the issue is GitHub's staleness, not your code.\n\n**RESOLVED\
      \ COMMENTS — DOCUMENT IN PR DESCRIPTION (bd-ara.1):**\nAfter fixing review comments\
      \ (CodeRabbit, Cursor Bugbot, Copilot, or human), document what you resolved:\n\
      - Run: `gh pr edit --body \"$(gh pr view --json body --jq .body)\\n\\n## Resolved\
      \ Comments\\n| Reviewer | File | Comment | Resolution |\\n|---|---|---|---|\\\
      n| coderabbitai[bot] | <file> | <comment summary> | Fixed in <commit SHA> |\"\
      ' to append a Resolved Comments table.\n- This satisfies green condition #5\
      \ (all inline comments resolved) by providing an auditable record.\n- Only document\
      \ Major/Critical/actionable comments — nitpicks and \"suggestion\" comments\
      \ do not block green.\n- The orchestrator's merge-gate check treats the PR description's\
      \ Resolved Comments table as evidence of resolution.\n\n**TEST FAILURES — RUN\
      \ LOCALLY BEFORE PUSHING (bd-ara.5):**\nWhen CI test fails:\n1. Run the failing\
      \ test locally FIRST: `pnpm -C packages/core test -- --reporter verbose 2>&1\
      \ | tail -50` (or the relevant test command from the failure output)\n2. Read\
      \ the actual failure output to understand what failed — do NOT guess\n3. Fix\
      \ only the failing test/assertion — do not add new tests in this push\n4. Run\
      \ the test again locally to confirm it passes before pushing\n5. Push only after\
      \ local test passes\n6. If the same test fails 3 times after 3 different fix\
      \ attempts, stop and send MCP mail: subject=\"Escalation: test failure after\
      \ 3 fix attempts — PR #<NUMBER>\", body describing the test, the 3 attempts\
      \ made, and the current error.\n"
