      --coder-agent <CODER_NAME>. Reviewer uses a different model family than the
      coder.'
    priority: action
  session-killed-no-push-threshold:
    auto: true
    action: notify
    priority: urgent
    threshold: '3'
    message: '[ -z "{{pr_number}}" ] && echo "No PR context — idle exit" && exit 0

