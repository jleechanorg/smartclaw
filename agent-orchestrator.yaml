    worktreeDir: ~/.worktrees/mcp-mail-main
    agentRules: >
      You are working in the mcp_mail repo.

      Resolve unresolved PR comments and failing required CI with minimal safe
      changes.

      Use conventional commits; never push directly to main.

      After each push, comment: @coderabbitai all good?
  worldclaw-dev:
    name: worldclaw_dev
    repo: jleechanorg/worldai_claw
    path: ~/worldclaw_dev
    defaultBranch: main
    sessionPrefix: wc17
    workspace: worktree
    worktreeDir: ~/.worktrees/worldclaw-dev
    backfillAllPRs: false
    agentRules: Build WorldClaw v1.7 in ~/worldclaw_dev per the user's detailed spec.
  llm_wiki:
    name: llm_wiki
    repo: jleechanorg/llm-wiki
    path: ${HOME}/llm_wiki
    defaultBranch: main
    sessionPrefix: lw
    agentRules: |-
      Always run tests before pushing.
      Use conventional commits (feat:, fix:, chore:, docs:, refactor:, test:).
