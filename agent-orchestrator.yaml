notifiers:
  hermes:
    plugin: webhook
    url: ${HERMES_GATEWAY_URL:-http://127.0.0.1:18810/hooks/agent}
    token: ${HERMES_AO_HOOK_TOKEN:-${OPENCLAW_AO_HOOK_TOKEN:-}}
    retries: 3
    retryDelayMs: 5000
    sessionKeyPrefix: "hook:ao:"
  orchestrator:
    plugin: webhook
    url: http://127.0.0.1:19888/ao-notify
    token: ${OPENCLAW_AO_NOTIFY_TOKEN}
    retries: 2
    retryDelayMs: 3000   # increased from 1000ms
  webhook:
    plugin: webhook
    url: http://localhost:19888/ao-notify
    token: ${OPENCLAW_HOOKS_TOKEN}
  slack:
    plugin: slack
    # Slack incoming webhook URL. Get it from Slack app settings: https://api.slack.com/messaging/webhooks
    # Format: https://hooks.slack.com/services/TXXXXX/BXXXXX/XXXXX
    # Set SLACK_WEBHOOK_URL env var, or replace ${SLACK_WEBHOOK_URL} with actual URL
    webhookUrl: "${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/PLACEHOLDER}"

notificationRouting:
  urgent: [hermes, orchestrator, slack]
  action: [hermes, orchestrator, slack]
  warning: [hermes]
  info: [hermes]

reactions:
  ci-failed:
    auto: true
    action: send-to-agent
    retries: 3
    escalateAfter: 2
  changes-requested:
    auto: true
    action: send-to-agent
    escalateAfter: 10m
  bugbot-comments:
    auto: true
    action: send-to-agent
    escalateAfter: 30m
  merge-conflicts:
    auto: true
    action: send-to-agent
    message: "Your branch has merge conflicts. Rebase on the default branch, resolve all conflicts (prefer incoming changes for formatting/style, prefer your changes for functional logic), then post a PR comment listing each conflicted file and which side you chose and why. Push the resolved branch."
    escalateAfter: 30m
  approved-and-green:
    auto: true
    action: send-to-agent
    message: "CodeRabbit has approved. Before declaring done, verify ALL 6 green conditions: (1) CI: gh pr view <PR_NUMBER> --repo <OWNER>/<REPO> --json statusCheckRollup --jq '[.statusCheckRollup[]|select(.conclusion==\"FAILURE\")]' must be empty. (2) Mergeable: gh pr view <PR_NUMBER> --repo <OWNER>/<REPO> --json mergeable --jq '.mergeable' must be MERGEABLE. (3) CR approved — confirmed. (4) Bugbot: gh pr checks <PR_NUMBER> --repo <OWNER>/<REPO> | grep -i bugbot — must show neutral or success, not failure. (5) ALL inline comments cleared (even post-APPROVE): gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments --jq '[.[] | select(.user.login==\"coderabbitai[bot]\") | select(.body | test(\"Major|Critical\"))] | length' — if > 0, fix and push again. Also check: gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments --jq '[.[] | select(.position != null)] | length' for all other unresolved inline comments. (6) Evidence gate: if PR has evidence* or testing_* files, run /er and confirm PASS. If no evidence bundle, skip. Only when all 6 pass: post a PR comment: 'PR is green — awaiting human merge review.' DO NOT run gh pr merge or merge the PR yourself."
    priority: action
  agent-stuck:
    auto: true
    action: send-to-agent
    threshold: 10m
    message: "You appear to be idle. Before stopping, verify your PR is truly green: (1) gh pr view <PR_NUMBER> --repo <OWNER>/<REPO> --json mergeable,statusCheckRollup (2) Check for post-APPROVE CR inline blockers: gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments --jq '[.[] | select(.user.login==\"coderabbitai[bot]\") | select(.body | test(\"Major|Critical\"))] | length' — if > 0, fix and push. (3) If truly done, post a PR comment: PR is green."
    escalateAfter: 20m
  agent-needs-input:
    auto: true
    action: send-to-agent
    message: "You appear to be waiting. Check PR status and review comments, then continue with the next unresolved item. If everything is resolved, summarize what you completed in a PR comment."
    escalateAfter: 30m
  review-requested:
    auto: true
    action: send-to-agent
    message: "Coder agent signaled PR ready for review. Dispatch reviewer_agent to run independent review: python -m orchestration.reviewer_agent <OWNER> <REPO> <PR_NUMBER> --coder-agent <CODER_NAME>. Reviewer uses a different model family than the coder."
    priority: action
  agent-exited:
    auto: true
    action: notify
    priority: urgent
