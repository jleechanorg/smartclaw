      (2) Check PR status and review comments, then continue with the next unresolved
      item. If everything is resolved, summarize what you completed in a PR comment.'
    escalateAfter: 30m
  review-requested:
    auto: true
    action: send-to-agent
    message: '[ -z "{{pr_number}}" ] && echo "No PR context — idle exit" && exit 0

      Coder agent signaled PR ready for review. Dispatch reviewer_agent to run independent
