dataDir: ~/.agent-orchestrator
worktreeDir: ~/.worktrees
port: 3020
defaults:
  runtime: tmux
  agent: minimax
  cli: minimax
  agentConfig:
    permissions: skip
    model: MiniMax-M2.7
  workspace: worktree
  notifiers:
    - openclaw
    - orchestrator
    - webhook
  modelByCli:
    minimax:
      model: MiniMax-M2.7
    codex:
      model: gpt-5.4
    claude-code:
      model: MiniMax-M2.7
  agentRules: >
    **COMMIT MESSAGE PREFIX — MANDATORY:**

    ALL commits MUST use the prefix `[agento]` in the commit message.

    Format: `[agento] type: description`

    Examples: `[agento] fix: address CR comments`, `[agento] test: add merge
    gate tests`

    This distinguishes autonomous agent work from interactive human+AI sessions.
    NEVER omit it.


    **MCP MAIL — MANDATORY PROTOCOL (non-negotiable):**

    You MUST send MCP mail messages for ALL tasks:

    1. IMMEDIATELY on task start:
    mcp__mcp-agent-mail__send_message(project_key="smartclaw",
    sender_name="claude", subject="Starting: <task>", body_md="Starting work on
    <task>. Will send updates every 5 min.")

    2. Every 5 minutes: send progress update with current status

    3. IMMEDIATELY on task complete/blocked: send final message with outcome

    Note: sender_name MUST be "claude" or "agento" (NOT "claude-code")

    IMPORTANT: Do NOT call mcp__mcp-agent-mail__register_agent — it will fail
    with a validation error. Just use send_message directly.


    **PRE-EXIT CHECKLIST (MANDATORY before declaring ready):**

    Before declaring a PR ready or exiting:

    1. For each open CR/Copilot inline comment, open the actual source file and
    confirm the fix exists at the referenced line.

    2. Run: `gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments --jq '[.[] |
    {path, line, body}]'`

    3. Verify each actionable comment item against the current code.

    4. Only then post merge-ready summary.


    **EVIDENCE REVIEW GATE (MANDATORY before declaring merge-ready):**

    Before declaring a PR ready to merge, run the evidence review gate:

    `PYTHONPATH=~/.smartclaw/src python -m orchestration.evidence_review_gate
    <PR_NUMBER>`

    If it exits non-zero, the PR is NOT ready — investigate and fix the evidence
    gap.


    **MCP MAIL INBOX POLLING PROTOCOL (at natural breakpoints):**

    OpenClaw may send guidance via MCP mail. Poll inbox at natural breakpoints:

    - After completing each subtask

    - After CI check cycle completes

    - After each commit/push

    - After PR status update

    Poll command:

    `mcp__mcp-agent-mail__fetch_inbox(project_key="smartclaw",
    agent_name="<your_session_name>", limit=5)`

    Handling:

    - guidance from openclaw: apply guidance before continuing

    - abort: stop immediately and exit cleanly

    - strategy_override: use provided strategy

    - urgent: handle urgent item first

    Rules:

    - Non-blocking: if no messages, continue immediately

    - No tight loops: poll only at natural breakpoints

    - Acknowledge guidance with a confirmation message


    **WHEN STUCK — ESCALATION STEPS:**

    If blocked, before asking a human:

    1. Try 3 different approaches.

    2. Use beads to track blocker: `br create --type task --priority 2
    "investigate: <specific>"`

    3. Post MCP mail progress update describing what was tried and the blocker.


    **SLASH COMMAND DISCOVERY (for all agents):**

    Discover available commands by reading:

    - `~/.claude/commands/*.md` (global commands)

    - `.claude/commands/*.md` (repo-local commands)

    Collision rule: when both exist for the same command name, repo-local
    `.claude/commands/*.md` overrides global.

    Execute equivalent logic based on the command's "EXECUTION INSTRUCTIONS"
    section.

    Key commands: /er (evidence review), /coderabbit or /cr (PR comment
    processing), /fixpr (autonomous fixes), /tester (e2e tests).


    **START HERE (do this before any code changes):**

    1. Run: gh pr view --comments <PR_NUMBER> --repo <OWNER>/<REPO>

    2. Run: gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/reviews | jq
    '.[].body'

    3. Run: gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments | jq '.[] |
    {path:.path, line:.line, body:.body}'

    Read ALL existing review comments (CodeRabbit, Cursor Bugbot, Copilot)
    before writing any code.


    **DEFINITION OF "GREEN" PR — ALL 6 must be true:**

    1. CI green — all required GitHub Actions checks pass

    2. No merge conflicts — mergeable: MERGEABLE

    3. CodeRabbit genuinely approved — APPROVED state. If CHANGES_REQUESTED, fix
    comments and post `@coderabbitai all good?`

    4. Cursor Bugbot finished — conclusion neutral/success, no blocking findings

    5. All inline AND issue comments resolved — check BOTH types:
       - Inline: `gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments` — fix all actionable items from CR, Copilot, Bugbot, humans
       - Issue/conversation: `gh api repos/<OWNER>/<REPO>/issues/<PR_NUMBER>/comments` — check for human requests or bot action items
       The lifecycle-worker runs `checkMergeGate()` automatically which checks all of these. Your job is to FIX the issues, not verify the gate.
    6. Evidence review — run /er after criteria 1-5 are met

    Never declare green unless all 6 are true. Post: "PR is green ✅ (6/6
    criteria met — awaiting auto-merge)"


    **NEVER MERGE YOURSELF — the orchestrator merges:**

    NEVER run `gh pr merge`. The automated orchestrator runs every 15 min and
    merges when all 6 criteria are met.

    Your job: get to 6/6, post the green signal, keep monitoring. Do not exit.


    **CI UNSTABLE / FAILURE — ACT IMMEDIATELY, NEVER PAUSE:**

    When mergeable_state=unstable OR any CI check shows FAILURE or in_progress:

    - Do NOT ask for permission. Do NOT wait.

    - Immediately run: `gh run list --branch $(git branch --show-current) --repo
    <OWNER>/<REPO> --limit 3` to identify the failing check

    - Then fix it with /copilot or direct code changes.

    - This is a STANDING DIRECTIVE — never pause or ask for approval when CI is
    unstable.

    - After pushing the fix, immediately post `@coderabbitai all good?`


    **AFTER POSTING @coderabbitai all good? — KEEP MONITORING:**

    When you have pushed a fix and asked @coderabbitai all good?:

    - Do NOT stop and wait for human.

    - Continue monitoring. Check CI status every 2 minutes with: `gh pr checks
    <PR> --watch`

    - Loop until CI is green (all checks pass) or red (definite failure).

    - If new CI failures appear: fix them, push, and re-post @coderabbitai all
    good?

    - Only exit when PR is merged, closed, or you receive explicit human
    instruction.


    **MANDATORY AFTER EVERY PUSH:**

    After every `git push`, immediately:

    1. Post exactly this comment on the PR: `@coderabbitai all good?`

    2. Wait for CodeRabbit response

    3. If CodeRabbit posts REQUEST_CHANGES, fix every actionable item and push
    again (do not run /er yet)

    4. If CodeRabbit posts APPROVE or LGTM, run /er and wait for /er to complete
    before declaring done

    Repeat until CodeRabbit posts APPROVE or LGTM. Do not stop until CodeRabbit
    posts a **genuine** `APPROVED` (see paired-review detection below).


    **VERIFY CR APPROVAL IS GENUINE — PAIRED-REVIEW DETECTION:**

    CR never posts APPROVED with body>0. After seeing CR APPROVED, check the
    temporal context of adjacent reviews:
      gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/reviews --paginate | jq -s '[.[][] | select(.user.login=="coderabbitai[bot]")] | .[-2:] | map(select(. != null) | {state, body_len: (.body // "" | length), submitted_at})'
    **Genuine**: COMMENTED review (body>0) posted within 10s before the APPROVED
    (CR's auto-review flow), or APPROVED as first/only review with no prior
    CHANGES_REQUESTED.

    **Fake**: Orphan APPROVED following CHANGES_REQUESTED with a large time gap
    and no preceding COMMENTED review — triggered by thread resolution, not a
    real re-review.

    If fake, post `@coderabbitai all good?` again and wait for a genuine paired
    review.


    **POST-APPROVAL INLINE COMMENTS ARE STILL BLOCKERS (CR-specific, in addition
    to criterion #5):**

    After receiving a genuine CodeRabbit `APPROVED`, also run:
      gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments --jq '.[] | select(.user.login=="coderabbitai[bot]") | {created_at,path,line,body: .body[0:200]}'
    If CodeRabbit left any inline comments tagged "Major" or "Critical" AFTER
    the APPROVE verdict timestamp, treat them as REQUEST_CHANGES — fix them,
    push, and post @coderabbitai all good? again.

    Note: This CR-specific check is in addition to criterion #5's all-reviewer
    inline comment check (which covers Copilot, Bugbot, humans, etc.).


    **REAL INTEGRATION TESTS FOR EXTERNAL SERVICE CHANGES:**

    If the PR touches any file that makes HTTP calls or talks to an external
    service (embedders, APIs, webhooks, DB clients), attempt a real smoke test
    before pushing — not just mocks:

    - Check if the service is available locally (e.g. `curl -s
    http://localhost:11434/api/tags` for Ollama)

    - If available, run the actual code path against it with a minimal input and
    assert the output shape is correct

    - If unavailable, note it explicitly in the PR description under "Testing" —
    do not silently skip

    Mock-only tests are insufficient for PRs that change external service client
    behavior.


    **NEVER MERGE — HUMAN APPROVES ALL MERGES:**

    NEVER run `gh pr merge` or any equivalent merge command. Your job ends when
    the PR is green (all 4 conditions met). Post a PR comment: "PR is green and
    ready for human merge review." Then stop. The human decides when and whether
    to merge.


    **PR NOTES:**

    - Tests must be committed separately from implementation (not bundled in
    same commit).

    - Slash command discovery precedence: if both `~/.claude/commands/<name>.md`
    and `.claude/commands/<name>.md` exist, repo-local `.claude/commands/` wins.

    - If using MiniMax model: use /team-mini to spin up a mini team for the
    implementation work.
plugins:
  scm-github:
    token: ${GITHUB_TOKEN}
projects:
  smartclaw:
    name: smartclaw orchestration
    repo: jleechanorg/smartclaw
    path: ${HOME}/projects/smartclaw
    defaultBranch: main
    sessionPrefix: jc
    workspace: worktree
    worktreeDir: ~/.worktrees/smartclaw-main
    backfillAllPRs: true
    agentRules: >
      You are working in the smartclaw orchestration repo.


      **CI UNSTABLE / FAILURE — ACT IMMEDIATELY, NEVER PAUSE:**

      When mergeable_state=unstable OR any CI check shows FAILURE or
      in_progress:

      - Do NOT ask for permission. Do NOT wait.

      - Immediately run: `gh run list --branch $(git branch --show-current)
      --repo <OWNER>/<REPO> --limit 3` to identify the failing check

      - Then fix it with /copilot or direct code changes.

      - This is a STANDING DIRECTIVE — never pause or ask for approval when CI
      is unstable.

      - After pushing the fix, immediately post `@coderabbitai all good?`


      **AFTER POSTING @coderabbitai all good? — KEEP MONITORING:**

      When you have pushed a fix and asked @coderabbitai all good?:

      - Do NOT stop and wait for human.

      - Continue monitoring. Check CI status every 2 minutes with: `gh pr checks
      <PR> --watch`

      - Loop until CI is green (all checks pass) or red (definite failure).

      - If new CI failures appear: fix them, push, and re-post @coderabbitai all
      good?

      - Only exit when PR is merged, closed, or you receive explicit human
      instruction.


      Always run `PYTHONPATH=src python -m pytest tests/test_genesis_config.py
      tests/test_genesis_cron.py tests/test_genesis_memory.py -q` before
      pushing.

      If the PR touches scripts/ or any file making HTTP calls to external
      services (Ollama, OpenAI, Slack, GitHub), attempt a real smoke test: check
      if the service is available locally first, run the actual code path with
      minimal input, assert output shape. If service unavailable, document it
      explicitly in the PR description under "Testing". Do not silently skip
      real tests in favour of mocks only.

      Use conventional commits (feat:, fix:, chore:, docs:).

      Never push to main directly — always open a PR.

      Never use git add -A; stage only files you changed.

      Once primary code is written and the PR is ready to finalize for merge:
      use /copilot to process all GitHub review comments, then /fixpr to fix any
      remaining issues. After every push, post "@coderabbitai all good?" and
      wait for CodeRabbit.

      If CodeRabbit posts REQUEST_CHANGES, fix every actionable item and push
      again (do not run /er yet). If CodeRabbit posts APPROVE or LGTM AND
      criteria 1-5 are met, run /er and wait for /er to complete before
      declaring done. Do not stop until CodeRabbit posts APPROVE or LGTM and
      criteria 1-5 are met. Do NOT use /copilot or /fixpr while still actively
      implementing features.

      Once criteria 1-5 are met (CI green, no conflicts, CR approved, Bugbot ok,
      threads resolved): run /er to get an independent evidence review. Only
      post the green signal ("PR is green ✅ (6/6 criteria met — awaiting
      auto-merge)") after /er returns PASS.


      **PR Priority Convention:** PR title must start with [P0], [P1], or [P2].
      P0 = stops autonomy. P1 = breaks green loop. P2 = improvement.
  browserclaw:
    name: browserclaw reverse API engineer
    repo: jleechanorg/browserclaw
    path: ~/projects/browserclaw
    defaultBranch: main
    sessionPrefix: bc
    workspace: worktree
    worktreeDir: ~/.worktrees/browserclaw-main
    backfillAllPRs: true
    autoMerge:
      enabled: false
    agent: minimax
    agentRules: >
      You are working in the browserclaw repo — a Python reverse-browser-traffic
      toolkit.

      Always run `PYTHONPATH=src python -m pytest -q` before pushing.

      Use conventional commits (feat:, fix:, chore:, docs:).

      Never push to main directly — always open a PR.

      Never use git add -A; stage only files you changed.

      Keep auth manual. Do not add auth bypass, CAPTCHA bypass, or
      stealth-evasion features.

      When capture logic changes, prefer a real local HAR smoke test in addition
      to unit tests. If a live site or browser dependency is unavailable,
      document that explicitly in the PR description under "Testing".
  worldarchitect:
    name: worldarchitect.ai
    repo: jleechanorg/worldarchitect.ai
    path: ~/projects/worldarchitect.ai
    defaultBranch: main
    sessionPrefix: wa
    workspace: worktree
    worktreeDir: ~/.worktrees/worldarchitect-main
    backfillAllPRs: false
    autoMerge:
      enabled: false
    agentConfig:
      model: MiniMax-M2.7
    agentRules: >
      You are working in the worldarchitect.ai repo — a Python/Flask game
