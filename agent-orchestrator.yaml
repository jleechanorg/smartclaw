      Once criteria 1-5 are met (CI green, no conflicts, CR approved, Bugbot ok, threads resolved): run /er to get an independent evidence review. Only post the green signal ("PR is green ✅ (6/6 criteria met — awaiting auto-merge)") after /er returns PASS.

