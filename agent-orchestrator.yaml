      Never use git add -A; stage only files you changed.
      Once primary code is written and the PR is ready to finalize for merge: use /copilot to process all GitHub review comments, then /fixpr to fix any remaining issues. After every push, post "@coderabbitai all good?" and wait for CodeRabbit.
      If CodeRabbit posts REQUEST_CHANGES, fix every actionable item and push again (do not run /er yet). If CodeRabbit posts APPROVE or LGTM AND criteria 1-5 are met, run /er and wait for /er to complete before declaring done. Do not stop until CodeRabbit posts APPROVE or LGTM and criteria 1-5 are met. Do NOT use /copilot or /fixpr while still actively implementing features.
      Once criteria 1-5 are met (CI green, no conflicts, CR approved, Bugbot ok, threads resolved): run /er to get an independent evidence review. Only post the green signal ("PR is green ✅ (6/6 criteria met — awaiting auto-merge)") after /er returns PASS.

