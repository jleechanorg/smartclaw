dataDir: ~/.agent-orchestrator
worktreeDir: ~/.worktrees
port: 3020

defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers: [hermes, orchestrator, webhook]
  modelByCli:
    minimax:
      model: MiniMax-M2.7
    codex:
      model: gpt-5.4
    claude-code:
      model: claude-haiku-4-5-20251001
  agentRules: |
    **COMMIT MESSAGE PREFIX — MANDATORY:**
    ALL commits MUST use the prefix `[agento]` in the commit message.
    Format: `[agento] type: description`
    Examples: `[agento] fix: address CR comments`, `[agento] test: add merge gate tests`
    This distinguishes autonomous agent work from interactive human+AI sessions. NEVER omit it.

    **MCP MAIL — MANDATORY PROTOCOL (non-negotiable):**
    You MUST send MCP mail messages for ALL tasks:
    1. IMMEDIATELY on task start: mcp__mcp-agent-mail__send_message(project_key="smartclaw", sender_name="claude", subject="Starting: <task>", body_md="Starting work on <task>. Will send updates every 5 min.")
    2. Every 5 minutes: send progress update with current status
    3. IMMEDIATELY on task complete/blocked: send final message with outcome
    Note: sender_name MUST be "claude" or "agento" (NOT "claude-code")
    IMPORTANT: Do NOT call mcp__mcp-agent-mail__register_agent — it will fail with a validation error. Just use send_message directly.

    **SLASH COMMAND DISCOVERY (for all agents):**
    Discover available commands by reading:
    - `~/.claude/commands/*.md` (global commands)
    - `.claude/commands/*.md` (repo-local commands)
    Collision rule: when both exist for the same command name, repo-local `.claude/commands/*.md` overrides global.
    Execute equivalent logic based on the command's "EXECUTION INSTRUCTIONS" section.
    Key commands: /er (evidence review), /coderabbit or /cr (PR comment processing), /fixpr (autonomous fixes), /tester (e2e tests).

    **START HERE (do this before any code changes):**
    1. Run: gh pr view --comments <PR_NUMBER> --repo <OWNER>/<REPO>
    2. Run: gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/reviews | jq '.[].body'
    3. Run: gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments | jq '.[] | {path:.path, line:.line, body:.body}'
    Read ALL existing review comments (CodeRabbit, Cursor Bugbot, Copilot) before writing any code.

    **DEFINITION OF "GREEN" / "PERFECT" / "MERGE-READY" PR — ALL 6 must be true:**
    1. CI green — all required GitHub Actions checks pass (no failures, no pending required checks)
    2. No merge conflicts — mergeable: "MERGEABLE" (not CONFLICTING)
    3. CodeRabbit approved — latest CR verdict is APPROVE or LGTM (REQUEST_CHANGES is a hard blocker)
    4. Cursor Bugbot finished — check run conclusion is "neutral" or "success" (not "failure"); no blocking bug findings
    5. All inline comments resolved — EVEN after CR APPROVE, run: gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments --jq '[.[] | select(.position != null)] | length' — must be 0 unresolved. Check comments from ALL reviewers (CR, Copilot, Bugbot, humans). Nitpicks are OK; Major/Critical/actionable are blockers.
    6. Evidence review PASS comment — REQUIRED for ALL PRs. After criteria 1-5 are met, ALL THREE of:
       a. Agent self-review: read the diff yourself, verify correctness, no obvious issues
       b. CodeRabbit review: check that coderabbitai[bot] has reviewed (APPROVE counts; if only comments, address them)
       c. Independent code review: run /er or dispatch a codex review — get a PASS from at least one of CodeRabbit OR codex
       Then post: "**PASS** — evidence review: agent self-reviewed ✅, CR reviewed ✅, [codex/CR] passed ✅"
       The orchestrator looks for **PASS** in comments — without it the PR will not be merged
    Never declare a PR ready unless all 6 are true.
    When all 6 are true, post: "PR is green ✅ (6/6 criteria met — awaiting auto-merge)"

    **NEVER MERGE YOURSELF — the orchestrator merges:**
    NEVER run `gh pr merge`. The automated orchestrator runs every 15 min and merges when all 6 criteria are met.
    Your job: get to 6/6, post the green signal, keep monitoring. Do not exit.

    **CI UNSTABLE / FAILURE — ACT IMMEDIATELY, NEVER PAUSE:**
    When mergeable_state=unstable OR any CI check shows FAILURE or in_progress:
    - Do NOT ask for permission. Do NOT wait.
    - Immediately run: `gh run list --branch $(git branch --show-current) --repo <OWNER>/<REPO> --limit 3` to identify the failing check
    - Then fix it with /copilot or direct code changes.
    - This is a STANDING DIRECTIVE — never pause or ask for approval when CI is unstable.
    - After pushing the fix, immediately post `@coderabbitai all good?`

    **AFTER POSTING @coderabbitai all good? — KEEP MONITORING:**
    When you have pushed a fix and asked @coderabbitai all good?:
    - Do NOT stop and wait for human.
    - Continue monitoring. Check CI status every 2 minutes with: `gh pr checks <PR> --watch`
    - Loop until CI is green (all checks pass) or red (definite failure).
    - If new CI failures appear: fix them, push, and re-post @coderabbitai all good?
    - Only exit when PR is merged, closed, or you receive explicit human instruction.

    **MANDATORY AFTER EVERY PUSH:**
    After every `git push`, immediately:
    1. Post exactly this comment on the PR: `@coderabbitai all good?`
    2. Wait for CodeRabbit response
    3. If CodeRabbit posts REQUEST_CHANGES, fix every actionable item and push again (do not run /er yet)
    4. If CodeRabbit posts APPROVE or LGTM, run /er and wait for /er to complete before declaring done
    Repeat until CodeRabbit posts APPROVE or LGTM.

    **POST-APPROVAL INLINE COMMENTS ARE STILL BLOCKERS:**
    After receiving a CodeRabbit APPROVE, also run:
      gh api repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments --jq '.[] | select(.user.login=="coderabbitai[bot]") | {created_at,path,line,body: .body[0:200]}'
    If CodeRabbit left any inline comments tagged "Major" or "Critical" AFTER the APPROVE verdict timestamp, treat them as REQUEST_CHANGES — fix them, push, and post @coderabbitai all good? again.

    **REAL INTEGRATION TESTS FOR EXTERNAL SERVICE CHANGES:**
    If the PR touches any file that makes HTTP calls or talks to an external service (embedders, APIs, webhooks, DB clients), attempt a real smoke test before pushing — not just mocks:
    - Check if the service is available locally (e.g. `curl -s http://localhost:11434/api/tags` for Ollama)
    - If available, run the actual code path against it with a minimal input and assert the output shape is correct
    - If unavailable, note it explicitly in the PR description under "Testing" — do not silently skip
    Mock-only tests are insufficient for PRs that change external service client behavior.

    **NEVER MERGE — HUMAN APPROVES ALL MERGES:**
    NEVER run `gh pr merge` or any equivalent merge command. Your job ends when the PR is green (all 4 conditions met). Post a PR comment: "PR is green and ready for human merge review." Then stop. The human decides when and whether to merge.

    **PR NOTES:**
    - Tests must be committed separately from implementation (not bundled in same commit).
    - Slash command discovery precedence: if both `~/.claude/commands/<name>.md` and `.claude/commands/<name>.md` exist, repo-local `.claude/commands/` wins.
    - If using MiniMax model: use /team-mini to spin up a mini team for the implementation work.

plugins:
  scm-github:
    token: ${GITHUB_TOKEN}

projects:
  jleechanclaw:
    name: jleechanclaw orchestration
    repo: jleechanorg/jleechanclaw
    path: ~/.openclaw
    agentRulesFile: workspace/AGENT_BASE_RULES.md
    defaultBranch: main
    sessionPrefix: jc
    workspace: worktree
    worktreeDir: ~/.worktrees/jleechanclaw-main
    backfillAllPRs: true   # handle all open PRs, not just [agento]-tagged ones

    agentConfig:
      permissions: skip   # --dangerously-skip-permissions
      model: claude-sonnet-4-6

    agentRules: |
      You are working in the jleechanclaw orchestration repo.

      **CI UNSTABLE / FAILURE — ACT IMMEDIATELY, NEVER PAUSE:**
      When mergeable_state=unstable OR any CI check shows FAILURE or in_progress:
      - Do NOT ask for permission. Do NOT wait.
      - Immediately run: `gh run list --branch $(git branch --show-current) --repo <OWNER>/<REPO> --limit 3` to identify the failing check
      - Then fix it with /copilot or direct code changes.
      - This is a STANDING DIRECTIVE — never pause or ask for approval when CI is unstable.
      - After pushing the fix, immediately post `@coderabbitai all good?`

      **AFTER POSTING @coderabbitai all good? — KEEP MONITORING:**
      When you have pushed a fix and asked @coderabbitai all good?:
      - Do NOT stop and wait for human.
      - Continue monitoring. Check CI status every 2 minutes with: `gh pr checks <PR> --watch`
      - Loop until CI is green (all checks pass) or red (definite failure).
      - If new CI failures appear: fix them, push, and re-post @coderabbitai all good?
      - Only exit when PR is merged, closed, or you receive explicit human instruction.

      Always run `PYTHONPATH=src python -m pytest tests/test_genesis_config.py tests/test_genesis_cron.py tests/test_genesis_memory.py -q` before pushing.
      If the PR touches scripts/ or any file making HTTP calls to external services (Ollama, OpenAI, Slack, GitHub), attempt a real smoke test: check if the service is available locally first, run the actual code path with minimal input, assert output shape. If service unavailable, document it explicitly in the PR description under "Testing". Do not silently skip real tests in favour of mocks only.
      Use conventional commits (feat:, fix:, chore:, docs:).
      Never push to main directly — always open a PR.
      Never use git add -A; stage only files you changed.
      Once primary code is written and the PR is ready to finalize for merge: use /copilot to process all GitHub review comments, then /fixpr to fix any remaining issues. After every push, post "@coderabbitai all good?" and wait for CodeRabbit.
      If CodeRabbit posts REQUEST_CHANGES, fix every actionable item and push again (do not run /er yet). If CodeRabbit posts APPROVE or LGTM AND criteria 1-5 are met, run /er and wait for /er to complete before declaring done. Do not stop until CodeRabbit posts APPROVE or LGTM and criteria 1-5 are met. Do NOT use /copilot or /fixpr while still actively implementing features.
      Once criteria 1-5 are met (CI green, no conflicts, CR approved, Bugbot ok, threads resolved): run /er to get an independent evidence review. Only post the green signal ("PR is green ✅ (6/6 criteria met — awaiting auto-merge)") after /er returns PASS.

      **PR Priority Convention:** PR title must start with [P0], [P1], or [P2]. P0 = stops autonomy. P1 = breaks green loop. P2 = improvement.

  worldarchitect:
    name: worldarchitect.ai
    repo: jleechanorg/worldarchitect.ai
    path: ~/projects/worldarchitect.ai
    agentRulesFile: workspace/AGENT_BASE_RULES.md
    defaultBranch: main
    sessionPrefix: wa
    workspace: worktree
    worktreeDir: ~/.worktrees/worldarchitect-main

    agentConfig:
      permissions: skip   # --dangerously-skip-permissions
      model: claude-sonnet-4-6

    agentRules: |
      You are working in the worldarchitect.ai repo — a Python/Flask game backend.
      Always run `python -m pytest tests/ -x -q` before pushing.
      Use conventional commits (feat:, fix:, chore:, docs:).
      Never push to main directly — always open a PR.
      Never use git add -A; stage only files you changed.
      Once primary code is written and the PR is ready to finalize for merge: use /copilot to process all GitHub review comments, then /fixpr to fix any remaining issues. After every push, post "@coderabbitai all good?" and wait for CodeRabbit.
      If CodeRabbit posts REQUEST_CHANGES, fix every actionable item and push again (do not run /er yet). If CodeRabbit posts APPROVE or LGTM AND criteria 1-5 are met, run /er and wait for /er to complete before declaring done. Do not stop until CodeRabbit posts APPROVE or LGTM and criteria 1-5 are met. Do NOT use /copilot or /fixpr while still actively implementing features.
      Once criteria 1-5 are met (CI green, no conflicts, CR approved, Bugbot ok, threads resolved): run /er to get an independent evidence review. Only post the green signal ("PR is green ✅ (6/6 criteria met — awaiting auto-merge)") after /er returns PASS.

  agent-orchestrator:
    name: agent-orchestrator fork
    repo: jleechanorg/agent-orchestrator
    path: ~/projects_reference/agent-orchestrator
    agentRulesFile: workspace/AGENT_BASE_RULES.md
    defaultBranch: main
    sessionPrefix: ao
    workspace: worktree
    worktreeDir: ~/.worktrees/agent-orchestrator-main
    backfillAllPRs: true

    agentConfig:
      permissions: skip
      model: claude-sonnet-4-6

    agentRules: |
      You are working in the jleechanorg/agent-orchestrator fork — a TypeScript/Node.js monorepo.
      Always run `pnpm test` before pushing (or `pnpm -C packages/core test` for core changes).
      Use conventional commits (feat:, fix:, chore:, docs:).
      Never push to main directly — always open a PR.
      Never use git add -A; stage only files you changed.
      Once primary code is written and the PR is ready to finalize for merge: use /copilot to process all GitHub review comments, then /fixpr to fix any remaining issues. After every push, post "@coderabbitai all good?" and wait for CodeRabbit.
      If CodeRabbit posts REQUEST_CHANGES, fix every actionable item and push again (do not run /er yet). If CodeRabbit posts APPROVE or LGTM, run /er and wait for /er to complete before declaring done. Do not stop until CodeRabbit posts APPROVE or LGTM.

